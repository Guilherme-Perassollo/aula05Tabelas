<!DOCTYPE html>
<html>
<title>contato.html</title>
<head>
<h1>Formulário de contato</h1>        
</head>
<body>
<form>
    <strong><label for="nome">Nome:</label></strong><br>
    <input type="text" id="nome" name="nome" required>
    <br><br>

    <strong><label for="email">Email:</label></strong><br>
    <input type="email" id="email" name="email" required>
    <br><br>

    <strong><label for="telefone">Telefone:</label></strong><br>
    <input type="tel" id="telefone" name="telefone" required>
    <br><br>

    <strong><label>Serviços de interesse:</label></strong><br>
<br>

<input type="checkbox" id="landing_page" name="Servico[]" value="Landing Page">
<label for="landing_page">Serviço de landing Page</label><br>

<input type="checkbox" id="site_institucional" name="Servico[]" value="Site Institucional">
<label for="site_institucional">Serviço de Site Institucional</label><br>

<input type="checkbox" id="ecommerce" name="Servico[]" value="E-commerce">
<label for="ecommerce">Serviço de E-commerce</label><br>

<input type="checkbox" id="app_mobile" name="Servico[]" value="App Mobile">
<label for="app_mobile">Serviço de app mobile</label><br>

<input type="checkbox" id="suporte_tecnico" name="Servico[]" value="Suporte Técnico">
<label for="suporte_tecnico">Serviço de suporte técnico</label><br>

<br>

    <strong><label>Sua mensagem:</label></strong><br>
    <textarea placeholder="Digite sua mensagem aqui..." id="mensagem_contato" name="Mensagem"></textarea><br>
    <br><br>

    <input type="checkbox" id="termos" name="termos" required>
    <label for="termos">Aceito os</label> <a href="#">Termos de uso</a>
    <br><br>
</form>

    <footer>
        <button type="submit">Enviar formulário</button>
        <button type="reset">Limpar formulário</button>
    </footer>

</body>
</html>
